<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes | Frío Cars</title>

    <!-- TAILWIND -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #06b6d4;
            border-radius: 20px;
        }
    </style>

</head>

<body class="bg-slate-950 text-white overflow-x-hidden">

    <!-- FONDO -->

    <div class="fixed inset-0 -z-10">

        <div class="absolute top-0 left-0 w-[400px] h-[400px] bg-cyan-500/15 rounded-full blur-3xl"></div>

        <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-blue-500/15 rounded-full blur-3xl"></div>

    </div>

    <!-- SIDEBAR -->

    <div id="sidebar-container"></div>

    <!-- MAIN -->

    <main class="ml-[290px] p-8">

        <!-- HEADER -->

        <header class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6 mb-10">

            <div>

                <h1 class="text-5xl font-black mb-4">

                    Gestión de

                    <span class="bg-gradient-to-r from-cyan-300 to-blue-500 bg-clip-text text-transparent">

                        Clientes

                    </span>

                </h1>

                <p class="text-slate-300 text-lg">

                    Administra clientes conectados automáticamente con ventas y cotizaciones.

                </p>

            </div>

            <!-- STATS -->

            <div class="flex gap-5 flex-wrap">

                <!-- TOTAL -->

                <div class="bg-white/5 border border-cyan-400/20 backdrop-blur-2xl rounded-3xl px-8 py-5">

                    <p class="text-slate-400 text-sm mb-2">

                        Clientes registrados

                    </p>

                    <h2 id="totalClientes" class="text-4xl font-black text-cyan-300">

                        0

                    </h2>

                </div>

            </div>

        </header>

        <!-- GRID -->

        <section class="grid grid-cols-1 xl:grid-cols-3 gap-8">

            <!-- FORMULARIO -->

            <div class="xl:col-span-1">

                <div class="bg-white/5 border border-white/10 backdrop-blur-2xl rounded-[35px] p-8 shadow-2xl">

                    <!-- TITULO -->

                    <div class="flex items-center gap-4 mb-8">

                        <div class="w-16 h-16 rounded-2xl bg-cyan-500/15 flex items-center justify-center text-3xl">

                            👤

                        </div>

                        <div>

                            <h2 class="text-2xl font-bold">

                                Registrar Cliente

                            </h2>

                            <p class="text-slate-400 text-sm">

                                Información del cliente

                            </p>

                        </div>

                    </div>

                    <!-- FORM -->

                    <form id="clienteForm" class="space-y-5">

                        <!-- DOCUMENTO -->

                        <div>

                            <label class="block mb-2 text-slate-300">

                                Documento

                            </label>

                            <input type="text" id="numero_documento"
                                class="w-full bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition"
                                placeholder="Número de documento">
                        </div>

                        <!-- NOMBRE -->

                        <div>

                            <label class="block mb-2 text-slate-300">

                                Nombre

                            </label>

                            <input type="text" id="nombre"
                                class="w-full bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition"
                                placeholder="Nombre">
                        </div>

                        <!-- APELLIDO -->

                        <div>

                            <label class="block mb-2 text-slate-300">

                                Apellido

                            </label>

                            <input type="text" id="apellido"
                                class="w-full bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition"
                                placeholder="Apellido">
                        </div>

                        <!-- TELEFONO -->

                        <div>

                            <label class="block mb-2 text-slate-300">

                                Teléfono

                            </label>

                            <input type="text" id="telefono"
                                class="w-full bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition"
                                placeholder="3001234567">
                        </div>

                        <!-- CORREO -->

                        <div>

                            <label class="block mb-2 text-slate-300">

                                Correo

                            </label>

                            <input type="email" id="correo"
                                class="w-full bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition"
                                placeholder="correo@email.com">
                        </div>

                        <!-- DIRECCION -->

                        <div>

                            <label class="block mb-2 text-slate-300">

                                Dirección

                            </label>

                            <textarea id="direccion" rows="3"
                                class="w-full bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition resize-none"
                                placeholder="Dirección"></textarea>

                        </div>

                        <!-- BOTON -->

                        <button type="submit"
                            class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 py-4 rounded-2xl font-bold text-lg hover:scale-[1.02] transition duration-300 shadow-[0_0_30px_rgba(6,182,212,.25)]">

                            Guardar Cliente

                        </button>

                    </form>

                </div>

            </div>

            <!-- TABLA -->

            <div class="xl:col-span-2">

                <div class="bg-white/5 border border-white/10 backdrop-blur-2xl rounded-[35px] p-8 shadow-2xl">

                    <!-- HEADER -->

                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5 mb-8">

                        <div>

                            <h2 class="text-3xl font-bold mb-2">

                                Clientes Registrados

                            </h2>

                            <p class="text-slate-400">

                                Lista general de clientes

                            </p>

                        </div>

                        <!-- BUSCADOR -->

                        <input type="text" id="buscarCliente" placeholder="Buscar cliente..."
                            class="bg-slate-900/70 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400 transition w-full md:w-[320px]">

                    </div>

                    <!-- TABLA -->

                    <div class="overflow-x-auto">

                        <table class="w-full">

                            <thead>

                                <tr class="border-b border-white/10 text-slate-400">

                                    <th class="text-left py-4">

                                        Cliente

                                    </th>

                                    <th class="text-left py-4">

                                        Documento

                                    </th>

                                    <th class="text-left py-4">

                                        Teléfono

                                    </th>

                                    <th class="text-left py-4">

                                        Puntos

                                    </th>

                                    <th class="text-left py-4">

                                        Acciones

                                    </th>

                                </tr>

                            </thead>

                            <tbody id="tablaClientes">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- SIDEBAR -->

    <script src="../assets/js/sidebar.js"></script>

    <!-- JS -->

    <script src="../assets/js/clientes.js"></script>


    <script src="../assets/js/auth.js"></script>

</body>

</html>
