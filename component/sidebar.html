        transform:translateX(0);

            <!-- DIVISOR SECCIÓN -->

            <a href="clientes.html" class="sidebar-link" data-page="clientes.html">

            <a href="tecnicos.html" class="sidebar-link" data-page="tecnicos.html">
                <span class="sb-icon"> </span>

            <!-- DIVISOR SECCIÓN -->

            <a href="carrito.html" class="sidebar-link" data-page="carrito.html" style="justify-content:space-between">

    <!-- LOGOUT -->

<!-- OVERLAY para móvil -->
<div id="sb-overlay" onclick="toggleSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;top:64px"></div>

<!-- BOTÓN TOGGLE (siempre visible en topbar) -->
<button id="sb-toggle-btn" onclick="toggleSidebar()" aria-label="Mostrar/ocultar menú"
    style="
        position:fixed;top:16px;left:14px;z-index:61;
        background:none;border:none;cursor:pointer;
        width:36px;height:36px;border-radius:10px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
        padding:6px;
        transition:background .2s;
    "
    onmouseover="this.style.background='var(--pri-lt)'"
    onmouseout="this.style.background='transparent'">
    <span class="sb-bar" style="display:block;width:18px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s"></span>
    <span class="sb-bar" style="display:block;width:18px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s"></span>
    <span class="sb-bar" style="display:block;width:18px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s"></span>
</button>

<style>
.sidebar-link{
    display:flex;align-items:center;gap:.9rem;
    padding:.72rem 1rem;border-radius:12px;
    font-size:.875rem;font-weight:500;color:var(--muted);
    text-decoration:none;
    transition:background .18s,color .18s,transform .15s;
    white-space:nowrap;overflow:hidden;
}
.sidebar-link:hover{
    background:var(--pri-lt);
    color:var(--pri)!important;
    transform:translateX(3px);
}
.sidebar-link[data-active="true"]{
    background:var(--pri)!important;
    color:#fff!important;
    font-weight:700!important;
    box-shadow:0 4px 14px rgba(29,78,216,.22);
    transform:none!important;
}
.sb-icon{
    font-size:1.05rem;
    flex-shrink:0;
    width:22px;text-align:center;
}
.sidebar-logout{
    display:flex;align-items:center;gap:1rem;
    color:#ef4444;font-size:.875rem;font-weight:500;
    padding:.8rem 1rem;border-radius:12px;
    text-decoration:none;
    transition:all .2s;
}
.sidebar-logout:hover{background:rgba(239,68,68,.08);color:#dc2626}

/* Estado colapsado */
#fc-sidebar.collapsed{transform:translateX(-268px)}
body.sb-collapsed .main-content{margin-left:0!important}

/* Animación hamburger → X */
#sb-toggle-btn.is-open .sb-bar:nth-child(1){transform:translateY(7px) rotate(45deg)}
#sb-toggle-btn.is-open .sb-bar:nth-child(2){opacity:0;transform:scaleX(0)}
#sb-toggle-btn.is-open .sb-bar:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

@media(max-width:900px){
    #fc-sidebar{transform:translateX(-268px)}
    #fc-sidebar.mobile-open{transform:translateX(0)!important}
    body.sb-collapsed .main-content{margin-left:0!important}
}
</style>

<script>
(function(){
    // ── Estado inicial desde localStorage
    const isMobile = window.innerWidth <= 900;
    const savedState = localStorage.getItem('sb-open');
    const sidebar = document.getElementById('fc-sidebar');
    const btn     = document.getElementById('sb-toggle-btn');
    const overlay = document.getElementById('sb-overlay');

    function applyState(open){
        if(isMobile){
            if(open){
                sidebar.classList.add('mobile-open');
                overlay.style.display = 'block';
                btn.classList.add('is-open');
            } else {
                sidebar.classList.remove('mobile-open');
                overlay.style.display = 'none';
                btn.classList.remove('is-open');
            }
        } else {
            if(open){
                sidebar.classList.remove('collapsed');
                document.body.classList.remove('sb-collapsed');
                btn.classList.add('is-open');
            } else {
                sidebar.classList.add('collapsed');
                document.body.classList.add('sb-collapsed');
                btn.classList.remove('is-open');
            }
        }
        // Ajustar main-content
        const main = document.querySelector('.main-content');
        if(main && !isMobile){
            main.style.marginLeft = open ? '268px' : '0';
        }
        localStorage.setItem('sb-open', open ? '1' : '0');
    }

    // Inicio: abierto por defecto en desktop, cerrado en mobile
    const startOpen = isMobile ? false : (savedState === null ? true : savedState === '1');
    applyState(startOpen);

    // Función global
    window.toggleSidebar = function(){
        const isOpen = isMobile
            ? sidebar.classList.contains('mobile-open')
            : !sidebar.classList.contains('collapsed');
        applyState(!isOpen);
    };

    // Activar link actual
    const currentPage = window.location.pathname.split('/').pop() || 'dashboard.html';
    document.querySelectorAll('.sidebar-link[data-page]').forEach(function(link){
        link.removeAttribute('data-active');
        if(link.dataset.page === currentPage){
            link.setAttribute('data-active','true');
        }
    });
})();
</script>
