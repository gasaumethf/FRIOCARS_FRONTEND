<!--
  component/sidebar.html
  Cargado por assets/js/sidebar.js via fetch()
  Mismos links de siempre — estilos nuevos coherentes con el login
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --sb-w:     268px;
    --pri:      #1d4ed8;
    --pri-h:    #1e40af;
    --pri-lt:   #eff6ff;
    --border:   #e2e8f0;
    --text:     #0f172a;
    --muted:    #64748b;
    --bg-sb:    #ffffff;
    --bg-hover: #f1f5fd;
  }

  /* tema oscuro heredado del login */
  body.soft-dark {
    --bg-sb:    #1e293b;
    --bg-hover: #263347;
    --border:   #334155;
    --text:     #e2e8f0;
    --muted:    #94a3b8;
    --pri-lt:   #1e3a5f;
  }
  body.sepia {
    --bg-sb:    #fffbf3;
    --bg-hover: #fdf0d8;
    --border:   #d4b896;
    --text:     #3d2008;
    --muted:    #7a5c3a;
    --pri:      #7c4f1e;
    --pri-lt:   #fdf0d8;
  }

  /* ── reset ── */
  #fc-sidebar, #fc-sidebar * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── contenedor ── */
  #fc-sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sb-w); height: 100vh;
    background: var(--bg-sb);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    font-family: 'Plus Jakarta Sans', sans-serif;
    z-index: 100;
    box-shadow: 2px 0 24px rgba(0,0,0,.06);
    transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s;
    overflow: hidden;
  }

  /* ── logo ── */
  .sb-head {
    padding: 1.4rem 1.2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .sb-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .sb-logo-icon {
    width:38px; height:38px; background:var(--pri); border-radius:11px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .sb-logo-icon svg { width:19px; height:19px; }
  .sb-logo-name { font-size:.97rem; font-weight:800; color:var(--text); line-height:1.2; }
  .sb-logo-sub  { font-size:.66rem; color:var(--muted); font-weight:500; }

  /* online badge */
  .sb-online {
    display:flex; align-items:center; gap:5px;
    background:#f0fdf4; border:1px solid #bbf7d0;
    border-radius:20px; padding:3px 9px;
    font-size:.66rem; font-weight:700; color:#15803d;
  }
  .sb-online-dot {
    width:7px; height:7px; background:#22c55e; border-radius:50%;
    animation: sb-p 2s ease-in-out infinite;
  }
  @keyframes sb-p { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  /* ── usuario ── */
  .sb-user {
    margin: .9rem .9rem .4rem;
    background: var(--pri-lt); border:1px solid #bfdbfe; border-radius:13px;
    padding:.75rem 1rem; display:flex; align-items:center; gap:9px;
    flex-shrink:0; transition: background .3s, border-color .3s;
  }
  body.soft-dark .sb-user { border-color:#334155; }
  .sb-avatar {
    width:36px; height:36px; background:var(--pri); border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:.88rem; font-weight:800; color:#fff; flex-shrink:0;
  }
  .sb-uname { font-size:.81rem; font-weight:700; color:var(--text); line-height:1.3; }
  .sb-urole { font-size:.67rem; color:var(--pri); font-weight:600; }

  /* ── nav ── */
  .sb-nav {
    flex:1; overflow-y:auto; padding:.4rem .7rem;
    scrollbar-width:thin; scrollbar-color:#e2e8f0 transparent;
  }
  .sb-nav::-webkit-scrollbar { width:3px; }
  .sb-nav::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:3px; }

  .sb-section {
    font-size:.62rem; font-weight:800; color:#94a3b8;
    text-transform:uppercase; letter-spacing:.1em;
    padding:.75rem .5rem .25rem; display:block;
  }

  /* link */
  .sb-a {
    display:flex; align-items:center; gap:10px;
    padding:.6rem .75rem; border-radius:10px;
    text-decoration:none; color:var(--muted);
    font-size:.83rem; font-weight:500;
    transition:all .16s ease; position:relative; margin-bottom:1px;
  }
  .sb-a:hover { background:var(--bg-hover); color:var(--text); }
  .sb-a.sb-active {
    background:var(--pri-lt); color:var(--pri); font-weight:700;
  }
  .sb-a.sb-active::before {
    content:''; position:absolute; left:0; top:22%; bottom:22%;
    width:3px; background:var(--pri); border-radius:0 3px 3px 0;
  }

  /* icono */
  .sb-ico {
    width:30px; height:30px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    background:transparent; transition:background .16s; flex-shrink:0;
    font-size:1rem; line-height:1;
  }
  .sb-a:hover   .sb-ico { background:#e0eaff; }
  .sb-a.sb-active .sb-ico { background:#dbeafe; }

  /* label flex */
  .sb-label { flex:1; }

  /* badge carrito */
  .sb-cart-badge {
    background:#ef4444; color:#fff;
    font-size:.62rem; font-weight:800;
    min-width:20px; height:20px; padding:0 6px;
    border-radius:20px; display:none;
    align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(239,68,68,.4);
  }
  .sb-cart-badge.visible { display:flex; }

  /* divisor */
  .sb-div { height:1px; background:var(--border); margin:.4rem .5rem; }

  /* ── logout ── */
  .sb-foot { padding:.8rem .7rem .9rem; border-top:1px solid var(--border); flex-shrink:0; }
  .sb-logout {
    display:flex; align-items:center; gap:10px;
    padding:.6rem .75rem; border-radius:10px;
    color:#64748b; font-size:.83rem; font-weight:600;
    cursor:pointer; background:none; border:none; width:100%;
    font-family:'Plus Jakarta Sans',sans-serif;
    transition:all .16s;
  }
  .sb-logout:hover { background:#fff5f5; color:#dc2626; }
  .sb-logout:hover .sb-ico { background:#fee2e2; }
  .sb-version { font-size:.63rem; color:#cbd5e1; text-align:center; margin-top:.45rem; }

  /* ── móvil ── */
  #sb-toggle {
    display:none; position:fixed; top:.9rem; left:.9rem; z-index:200;
    width:40px; height:40px; background:var(--pri); border:none;
    border-radius:10px; cursor:pointer;
    align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(29,78,216,.3);
  }
  #sb-toggle svg { width:17px; height:17px; color:#fff; }
  #sb-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.32); z-index:99; backdrop-filter:blur(2px);
  }
  @media(max-width:900px){
    #sb-toggle { display:flex; }
    #fc-sidebar { transform:translateX(calc(-1 * var(--sb-w))); }
    #fc-sidebar.open { transform:translateX(0); }
    #sb-overlay.open { display:block; }
  }

  /* margin del main */
  body.has-sidebar main,
  body.has-sidebar .main-content { margin-left:var(--sb-w) !important; }
  @media(max-width:900px){
    body.has-sidebar main,
    body.has-sidebar .main-content { margin-left:0 !important; }
  }
</style>

<!-- toggle móvil -->

    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>

</button>
<div id="sb-overlay"></div>
