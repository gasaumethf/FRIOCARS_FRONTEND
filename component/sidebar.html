<!--
  component/sidebar.html
  HTML puro de la barra lateral — cargado por assets/js/sidebar.js via fetch()
  No incluye <html>, <head> ni <body>. Solo el <aside> y sus estilos.
-->

<style>
  :root {
    --sb-w: 268px;
    --pri: #1d4ed8; --pri-h: #1e40af; --pri-lt: #eff6ff;
    --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
    --bg-sb: #ffffff; --bg-hover: #f1f5fd;
    --font: 'Plus Jakarta Sans', sans-serif;
  }

  /* Tema oscuro */
  body.soft-dark { --bg-sb:#1e293b; --bg-hover:#263347; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --pri-lt:#1e3a5f; }

  #fc-sidebar * { box-sizing: border-box; margin: 0; padding: 0; }

  #fc-sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sb-w); height: 100vh;
    background: var(--bg-sb);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    font-family: var(--font);
    z-index: 100;
    box-shadow: 2px 0 20px rgba(0,0,0,.05);
    transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s;
  }

  /* ── Header ── */
  .sb-header {
    padding: 1.5rem 1.4rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .sb-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .sb-logo-icon {
    width:36px; height:36px; background:var(--pri); border-radius:10px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .sb-logo-icon svg { width:18px; height:18px; }
  .sb-logo-text { font-size:.95rem; font-weight:800; color:var(--text); line-height:1.2; }
  .sb-logo-sub  { font-size:.67rem; color:var(--muted); font-weight:500; display:block; }

  .sb-status {
    display:flex; align-items:center; gap:6px;
    background:#f0fdf4; border:1px solid #bbf7d0;
    border-radius:20px; padding:4px 10px;
    font-size:.67rem; font-weight:700; color:#15803d; flex-shrink:0;
  }
  .sb-status-dot {
    width:7px; height:7px; background:#22c55e; border-radius:50%;
    animation: sb-pulse 2s ease-in-out infinite;
  }
  @keyframes sb-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

  /* ── Usuario ── */
  .sb-user {
    margin: 1rem 1rem .5rem;
    background: var(--pri-lt); border: 1px solid #bfdbfe; border-radius:14px;
    padding: .8rem 1rem; display:flex; align-items:center; gap:10px; flex-shrink:0;
    transition: background .3s, border-color .3s;
  }
  .sb-avatar {
    width:38px; height:38px; background:var(--pri); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:.9rem; font-weight:800; color:#fff; flex-shrink:0;
  }
  .sb-user-name { font-size:.82rem; font-weight:700; color:var(--text); line-height:1.3; }
  .sb-user-role { font-size:.69rem; color:var(--pri); font-weight:600; }

  /* ── Navegación ── */
  .sb-nav {
    flex:1; overflow-y:auto; padding:.5rem .8rem;
    scrollbar-width:thin; scrollbar-color:#dde3ed transparent;
  }
  .sb-nav::-webkit-scrollbar { width:4px; }
  .sb-nav::-webkit-scrollbar-thumb { background:#dde3ed; border-radius:4px; }

  .sb-section-label {
    font-size:.64rem; font-weight:800; color:#94a3b8;
    text-transform:uppercase; letter-spacing:.1em;
    padding:.8rem .6rem .3rem;
  }

  /* link base */
  .sb-link {
    display:flex; align-items:center; gap:11px;
    padding:.62rem .8rem; border-radius:11px;
    text-decoration:none; color:var(--muted);
    font-size:.84rem; font-weight:500;
    transition:all .18s ease; position:relative; margin-bottom:2px;
  }
  .sb-link:hover { background:var(--bg-hover); color:var(--text); }

  /* activo — lo añade sidebar.js con la clase "sb-active" */
  .sb-link.sb-active {
    background:var(--pri-lt); color:var(--pri); font-weight:700;
  }
  .sb-link.sb-active::before {
    content:''; position:absolute; left:0; top:20%; bottom:20%;
    width:3px; background:var(--pri); border-radius:0 3px 3px 0;
  }

  .sb-icon {
    width:30px; height:30px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    background:transparent; transition:background .18s; flex-shrink:0;
  }
  .sb-link:hover  .sb-icon { background:#e0eaff; }
  .sb-link.sb-active .sb-icon { background:#dbeafe; }
  .sb-icon svg { width:16px; height:16px; }

  .sb-badge {
    font-size:.64rem; font-weight:800; background:var(--pri); color:#fff;
    padding:2px 7px; border-radius:20px; min-width:20px; text-align:center;
  }
  .sb-badge.warn { background:#f59e0b; }

  .sb-div { height:1px; background:var(--border); margin:.5rem .8rem; }

  /* ── Footer ── */
  .sb-footer { padding:.9rem 1rem; border-top:1px solid var(--border); flex-shrink:0; }
  .sb-logout {
    display:flex; align-items:center; gap:10px; padding:.6rem .8rem;
    border-radius:11px; text-decoration:none; color:var(--muted);
    font-size:.83rem; font-weight:600; transition:all .18s;
    cursor:pointer; background:none; border:none; width:100%;
    font-family:var(--font);
  }
  .sb-logout:hover { background:#fff5f5; color:#dc2626; }
  .sb-logout:hover .sb-icon { background:#fee2e2; }
  .sb-version { font-size:.65rem; color:#cbd5e1; text-align:center; margin-top:.5rem; }

  /* ── Ajuste del main ── */
  body.has-sidebar main,
  body.has-sidebar .main-content { margin-left: var(--sb-w) !important; }

  /* ── Móvil ── */
  #sb-toggle {
    display:none; position:fixed; top:1rem; left:1rem; z-index:200;
    width:40px; height:40px; background:var(--pri); border:none;
    border-radius:10px; cursor:pointer; align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(29,78,216,.3);
  }
  #sb-toggle svg { width:18px; height:18px; color:#fff; }
  #sb-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.35); z-index:99; backdrop-filter:blur(2px);
  }

  @media(max-width:900px) {
    #sb-toggle { display:flex; }
    #fc-sidebar { transform:translateX(calc(-1 * var(--sb-w))); }
    #fc-sidebar.open { transform:translateX(0); }
    #sb-overlay.open { display:block; }
    body.has-sidebar main,
    body.has-sidebar .main-content { margin-left:0 !important; }
  }
</style>

<!-- Toggle móvil -->
