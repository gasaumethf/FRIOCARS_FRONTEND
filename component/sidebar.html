<style>
.sidebar-link{
    display:flex;align-items:center;gap:.9rem;
    padding:.72rem 1rem;border-radius:12px;
    font-size:.875rem;font-weight:500;color:var(--muted);
    text-decoration:none;
    transition:background .18s,color .18s,transform .15s;
    white-space:nowrap;overflow:hidden;
}
.sidebar-link:hover{background:var(--pri-lt);color:var(--pri)!important;transform:translateX(3px)}
.sidebar-link[data-active="true"]{background:var(--pri)!important;color:#fff!important;font-weight:700!important;box-shadow:0 4px 14px rgba(29,78,216,.22);transform:none!important}
.sb-icon{font-size:1.05rem;flex-shrink:0;width:22px;text-align:center}
.sidebar-logout{display:flex;align-items:center;gap:1rem;color:#ef4444;font-size:.875rem;font-weight:500;padding:.8rem 1rem;border-radius:12px;text-decoration:none;transition:all .2s}
.sidebar-logout:hover{background:rgba(239,68,68,.08);color:#dc2626}
</style>

<script>
(function(){
    const currentPage = window.location.pathname.split('/').pop() || 'dashboard.html';
    document.querySelectorAll('.sidebar-link[data-page]').forEach(function(link){
        link.removeAttribute('data-active');
        if(link.dataset.page === currentPage) link.setAttribute('data-active','true');
    });
})();
</script>
